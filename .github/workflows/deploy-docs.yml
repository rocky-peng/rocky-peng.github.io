
name: 部署文档

on:
  push:
    branches:
      # 确保这是你正在使用的分支名称
      - main
  schedule:
    - cron: "30 2/4 * * *"

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v1
        with:
          java-version: 11
          settings-path: ".m2/"

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          # 如果你文档需要 Git 子模块，取消注释下一行
          # submodules: true

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 7.18.2
          run_install: false


      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16.18.1
          # cache: pnpm


      - name: 构建文档
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: |-
          node -v
          pnpm -v
          npm install
          npm run docs:build
          > src/.vuepress/dist/.nojekyll

      - name: sitemap2readme
        run: |
          cd sitemap2readme
          java -jar sitemap2readme-0.0.1-SNAPSHOT.jar ../README.md ../src/.vuepress/dist/sitemap.xml
          cat ../README.md

      - name: 部署文档
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # 这是文档部署到的分支名称
          branch: gh-pages
          folder: src/.vuepress/dist
